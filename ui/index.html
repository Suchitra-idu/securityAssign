<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Secure Bank</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="page-auth">
  <main class="auth-shell">
    <div class="auth-card">
      <div class="brand-lockup">
        <div class="brand-mark">SB</div>
        <div>
          <div class="brand-name">Secure Bank</div>
          <div class="brand-sub">Welcome back</div>
        </div>
      </div>

      <div class="segment" role="tablist">
        <button class="seg-btn active" data-tab="login" role="tab">Sign in</button>
        <button class="seg-btn" data-tab="register" role="tab">Create account</button>
      </div>

      <form id="login-form" class="auth-form active" autocomplete="on">
        <label>
          <span>Username</span>
          <input name="username" required autocomplete="username" placeholder="Your username">
        </label>
        <label>
          <span>Password</span>
          <input name="password" type="password" required autocomplete="current-password" placeholder="Your password">
        </label>
        <button type="submit" class="btn-primary">Sign in</button>
      </form>

      <form id="register-form" class="auth-form" autocomplete="on">
        <label>
          <span>Choose a username</span>
          <input name="username" required minlength="3" maxlength="64" autocomplete="username">
        </label>
        <label>
          <span>Choose a password</span>
          <input name="password" type="password" required minlength="12" autocomplete="new-password">
          <small>Use 12 or more characters.</small>
        </label>
        <button type="submit" class="btn-primary">Create account</button>
      </form>

      <div id="auth-error" class="banner banner-error" hidden></div>
    </div>
  </main>

  <script src="/session.js"></script>
  <script src="/login.js"></script>
</body>
</html>
