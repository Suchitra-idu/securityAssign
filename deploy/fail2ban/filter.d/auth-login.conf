# fail2ban filter for the auth service.
#
# Matches:
#   LOGIN_FAILED ip=203.0.113.7 username=alice
#   REFRESH_FAILED ip=203.0.113.7
#
# The ip= token is the client IP the auth service extracts from Caddy's
# X-Real-IP header. Anchored on the fixed prefix so partial matches
# elsewhere in a log line cannot trigger a ban.

[Definition]
failregex = ^.*(LOGIN_FAILED|REFRESH_FAILED) ip=<HOST>
ignoreregex =
