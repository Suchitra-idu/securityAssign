# fail2ban jail for the auth service.
#
# Assumes the auth container's stdout is being captured to a file the
# host fail2ban can read. Simplest with Docker's json-file driver:
#
#     logpath = /var/lib/docker/containers/*/auth*-json.log
#
# Or with a bind-mounted log volume:
#
#     logpath = /var/log/auth-service/*.log
#
# Update logpath to whatever your compose deployment produces. See
# ../README.md for install and wiring instructions.
#
# Thresholds tuned for a real user picking a wrong password a couple of
# times: 5 failures in 5 minutes → banned for an hour. Bruteforcers hit
# it in seconds; a legitimate user does not.

[auth-login]
enabled  = true
filter   = auth-login
logpath  = /var/log/auth-service/*.log
findtime = 300
maxretry = 5
bantime  = 3600
action   = iptables-multiport[name=auth, port="80,443,8080,8443"]
