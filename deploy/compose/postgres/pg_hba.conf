# Postgres client authentication.
#
# local — Unix-socket connections used by the docker-entrypoint init
#   scripts (which run as postgres inside the container). Trusted.
# hostssl — every remote TCP connection MUST use TLS. Plain-text host
#   is deliberately absent so `psql "sslmode=disable"` from another
#   container is rejected before auth.

# TYPE   DATABASE   USER   ADDRESS       METHOD
local    all        all                  trust
hostssl  all        all    0.0.0.0/0     scram-sha-256
hostssl  all        all    ::/0          scram-sha-256
