# Coraza engine configuration. Loaded before crs-setup.conf and the
# OWASP CRS rules. Everything here is standard Coraza / ModSecurity
# SecLang — trimmed to what this deployment actually uses.

# --- Engine mode -----------------------------------------------------------
# DetectionOnly during the demo: rules evaluate and log violations but
# never block. Switch to `On` after the OWASP CRS is tuned for our JSON
# API. Setting `Off` disables the WAF entirely.
SecRuleEngine DetectionOnly

# --- Request body ---------------------------------------------------------
# Body inspection is on so JSON payloads (login, register, refresh) get
# checked. Limits keep an attacker from pinning memory with huge bodies.
SecRequestBodyAccess On
SecRequestBodyLimit 13107200
SecRequestBodyNoFilesLimit 131072
SecRequestBodyLimitAction Reject

# JSON is our only content type, so tell Coraza how to parse it.
SecRule REQUEST_HEADERS:Content-Type "@rx application/json" \
    "id:200001,phase:1,pass,nolog,ctl:requestBodyProcessor=JSON"

# --- Response body --------------------------------------------------------
# Not inspecting responses. Nothing we return is sensitive to output
# filtering, and skipping saves latency.
SecResponseBodyAccess Off

# --- Audit log ------------------------------------------------------------
# Stream to stdout so docker-compose logs captures Coraza events for demo
# and later fail2ban integration.
SecAuditEngine RelevantOnly
# RE2 (Coraza's engine) has no lookaround. Log every 4xx and 5xx, including
# 404s — noisier than ModSecurity's default but simpler and correct.
SecAuditLogRelevantStatus "^[45]"
SecAuditLogParts ABIJDEFHZ
SecAuditLog /dev/stdout
SecAuditLogType Serial
SecAuditLogFormat JSON

# --- Argument, cookie, and PCRE limits ------------------------------------
SecArgumentSeparator &
SecCookieFormat 0
SecPcreMatchLimit 100000
SecPcreMatchLimitRecursion 100000

# --- Default action -------------------------------------------------------
# SecDefaultAction is defined by crs-setup.conf (loaded after this file)
# because it sets a CRS tag. Defining it here too would raise the
# "SecDefaultAction already defined for this phase" error.

# --- Miscellaneous --------------------------------------------------------
SecDataDir /tmp/
SecTmpDir /tmp/
